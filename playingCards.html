<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="playingCardsStyle.css">
</head>
<body>
    <main id="playing-cards">
        <div id="left-card" class="card black">
            <div class="left">3♠</div>
            <div class="middle">
            <div>♠</div>
            <div>♠</div>
            <div class="flip">♠</div>
            </div>
            <div class="right">♠3</div>
        </div>

        <div id="middle-card" class="card black">
            <div class="left">A♣</div>
            <div class="middle">♣</div>
            <div class="right">♣A</div>
        </div>

        <div id="right-card" class="card red">
            <div class="left">5♥</div>
            <div class="middle">
                <div>♥ ♥</div>
                <div>♥</div>
                <div class="flip">♥ ♥</div>
            </div>

            <div class="right">♥ 5</div>
        </div>
    </main>
</body>

</html>
